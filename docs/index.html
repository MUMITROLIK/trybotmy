<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Futures Signal Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f;--surface:#111118;--border:#1e1e2e;
    --text:#e0e0f0;--muted:#555570;
    --green:#00ff88;--red:#ff3366;--yellow:#ffd700;--blue:#4488ff;--orange:#ff8c00;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;
    background-image:linear-gradient(rgba(68,136,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(68,136,255,.03) 1px,transparent 1px);
    background-size:40px 40px;}
  header{padding:22px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
  .logo{font-size:22px;font-weight:800;}.logo span{color:var(--green);}
  #last-update{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);}
  .live-dot{width:8px;height:8px;background:var(--green);border-radius:50%;display:inline-block;margin-right:6px;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,255,136,.5);}50%{opacity:.7;box-shadow:0 0 0 6px rgba(0,255,136,0);}}
  main{padding:26px 40px;max-width:1400px;margin:0 auto;}

  /* Stats + FG row */
  .top-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 220px;gap:14px;margin-bottom:24px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 22px;position:relative;overflow:hidden;}
  .stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),transparent);}
  .stat-label{font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:8px;}
  .stat-value{font-size:32px;font-weight:800;line-height:1;}
  .stat-value.green{color:var(--green);text-shadow:0 0 20px rgba(0,255,136,.25);}
  .stat-value.red{color:var(--red);text-shadow:0 0 20px rgba(255,51,102,.25);}
  .stat-value.gold{color:var(--yellow);}

  /* Fear & Greed */
  .fg-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 22px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;}
  .fg-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--orange),transparent);}
  .fg-emoji{font-size:28px;margin-bottom:4px;}
  .fg-value{font-size:28px;font-weight:800;}
  .fg-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px;}
  .fg-bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;}
  .fg-fill{height:100%;border-radius:2px;transition:width 1s ease;}

  .section-title{font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border);}

  /* BTC Chart */
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px;}
  .chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .btc-price-big{font-family:'Space Mono',monospace;font-size:26px;font-weight:700;}
  .btc-change{font-family:'Space Mono',monospace;font-size:12px;padding:3px 9px;border-radius:6px;margin-left:8px;}
  .btc-change.up{background:rgba(0,255,136,.15);color:var(--green);}
  .btc-change.down{background:rgba(255,51,102,.15);color:var(--red);}
  .tf-btns{display:flex;gap:5px;}
  .tf-btn{font-family:'Space Mono',monospace;font-size:11px;background:var(--border);border:1px solid transparent;color:var(--muted);padding:3px 9px;border-radius:5px;cursor:pointer;transition:all .2s;}
  .tf-btn.active{background:rgba(68,136,255,.2);border-color:var(--blue);color:var(--blue);}
  canvas#btcChart{width:100%!important;height:200px!important;}

  /* Modal chart */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:90%;max-width:800px;position:relative;}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .modal-title{font-size:18px;font-weight:800;}
  .modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px;}
  .modal-close:hover{color:var(--text);}
  .modal-tf-btns{display:flex;gap:5px;margin-bottom:14px;}
  canvas#modalChart{width:100%!important;height:260px!important;}
  .modal-info{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px;}
  .modal-info-item{text-align:center;}
  .modal-info-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:3px;}
  .modal-info-val{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;}

  /* Signals */
  .signals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-bottom:32px;}
  .signal-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden;animation:fadeIn .4s ease both;cursor:pointer;transition:border-color .2s;}
  .signal-card:hover{border-color:var(--blue);}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}}
  .signal-card.long{border-left:3px solid var(--green);}
  .signal-card.short{border-left:3px solid var(--red);}
  .signal-card.long::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,255,136,.04),transparent 60%);pointer-events:none;}
  .signal-card.short::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,51,102,.04),transparent 60%);pointer-events:none;}
  .sig-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .sig-symbol{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;}
  .sig-dir{font-size:10px;font-weight:700;letter-spacing:2px;padding:3px 10px;border-radius:20px;}
  .sig-dir.long{background:rgba(0,255,136,.15);color:var(--green);}
  .sig-dir.short{background:rgba(255,51,102,.15);color:var(--red);}
  .sig-prices{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
  .price-item{text-align:center;}
  .price-label{font-size:9px;font-family:'Space Mono',monospace;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:3px;}
  .price-val{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;}
  .price-val.tp{color:var(--green);}.price-val.sl{color:var(--red);}
  .strength-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:8px;}
  .strength-fill{height:100%;border-radius:2px;}
  .sig-reasons{display:flex;flex-wrap:wrap;gap:4px;}
  .reason-tag{font-size:9px;font-family:'Space Mono',monospace;background:rgba(68,136,255,.1);border:1px solid rgba(68,136,255,.2);color:var(--blue);padding:2px 6px;border-radius:3px;}
  .sig-time{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:8px;}
  .chart-hint{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);opacity:.6;margin-top:4px;}

  /* History */
  .history-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:40px;}
  .history-table{width:100%;border-collapse:collapse;}
  .history-table th{font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);}
  .history-table td{font-family:'Space Mono',monospace;font-size:12px;padding:10px 14px;border-bottom:1px solid rgba(30,30,46,.8);}
  .history-table tr:hover td{background:rgba(255,255,255,.02);}
  .badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:1px;}
  .badge.tp{background:rgba(0,255,136,.15);color:var(--green);}
  .badge.sl{background:rgba(255,51,102,.15);color:var(--red);}
  .badge.exp{background:rgba(85,85,112,.2);color:var(--muted);}
  .badge.long{color:var(--green);}.badge.short{color:var(--red);}
  .empty{text-align:center;padding:50px 20px;color:var(--muted);font-family:'Space Mono',monospace;font-size:12px;}

  @media(max-width:900px){
    header,main{padding:16px;}
    .top-row{grid-template-columns:repeat(2,1fr);}
    .fg-card{grid-column:1/-1;}
    .sig-prices{grid-template-columns:repeat(2,1fr);}
    .btc-price-big{font-size:20px;}
  }
</style>
</head>
<body>
<header>
  <div class="logo">⚡ Futures<span>Bot</span></div>
  <div id="last-update"><span class="live-dot"></span>Загрузка...</div>
</header>

<!-- Modal для графика монеты -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">—</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-tf-btns">
      <button class="tf-btn active" onclick="setModalTF('5m')">5м</button>
      <button class="tf-btn" onclick="setModalTF('15m')">15м</button>
      <button class="tf-btn" onclick="setModalTF('1h')">1ч</button>
      <button class="tf-btn" onclick="setModalTF('4h')">4ч</button>
    </div>
    <canvas id="modalChart"></canvas>
    <div class="modal-info" id="modal-info"></div>
  </div>
</div>

<main>
  <!-- Stats + Fear & Greed -->
  <div class="top-row">
    <div class="stat-card"><div class="stat-label">Всего сигналов</div><div class="stat-value" id="s-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Профит</div><div class="stat-value green" id="s-wins">—</div></div>
    <div class="stat-card"><div class="stat-label">Стоп</div><div class="stat-value red" id="s-losses">—</div></div>
    <div class="stat-card"><div class="stat-label">Winrate</div><div class="stat-value gold" id="s-winrate">—</div></div>
    <div class="fg-card">
      <div>
        <div class="stat-label">Fear & Greed</div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="fg-emoji" id="fg-emoji">😐</span>
          <span class="fg-value" id="fg-value">—</span>
        </div>
        <div class="fg-label" id="fg-label">Загрузка...</div>
      </div>
      <div class="fg-bar"><div class="fg-fill" id="fg-fill" style="width:50%"></div></div>
    </div>
  </div>

  <!-- BTC Chart -->
  <div class="section-title">📈 BTC/USDT реальное время</div>
  <div class="chart-card">
    <div class="chart-header">
      <div style="display:flex;align-items:center">
        <span class="btc-price-big" id="btc-price">—</span>
        <span class="btc-change" id="btc-change">—</span>
      </div>
      <div class="tf-btns">
        <button class="tf-btn active" onclick="setTF('1m')">1м</button>
        <button class="tf-btn" onclick="setTF('5m')">5м</button>
        <button class="tf-btn" onclick="setTF('15m')">15м</button>
        <button class="tf-btn" onclick="setTF('1h')">1ч</button>
        <button class="tf-btn" onclick="setTF('4h')">4ч</button>
      </div>
    </div>
    <canvas id="btcChart"></canvas>
  </div>

  <!-- Active signals -->
  <div class="section-title">🟢 Активные сигналы</div>
  <div class="signals-grid" id="signals-container">
    <div class="empty">📡 Загрузка...</div>
  </div>

  <!-- History -->
  <div class="section-title">📋 История</div>
  <div class="history-wrap">
    <table class="history-table">
      <thead><tr><th>Монета</th><th>Тип</th><th>Вход</th><th>TP1</th><th>SL</th><th>Сила</th><th>Результат</th><th>Время</th></tr></thead>
      <tbody id="history-body"><tr><td colspan="8" class="empty">Нет данных</td></tr></tbody>
    </table>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// ── Утилиты ───────────────────────────────────────────────────────────────────
function fmt(n) {
  if (!n && n !== 0) return '—';
  const v = parseFloat(n);
  if (v >= 10000) return v.toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2});
  if (v >= 1)     return v.toFixed(4);
  if (v >= 0.0001)return v.toFixed(6);
  return v.toExponential(2);
}
function sc(s) { return s >= 75 ? '#00ff88' : s >= 55 ? '#ffd700' : '#4488ff'; }
function ago(iso) {
  const d = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (d < 60)   return d + 'с назад';
  if (d < 3600) return Math.floor(d/60) + 'м назад';
  return Math.floor(d/3600) + 'ч назад';
}
function fmtTime(ts, tf) {
  const dt = new Date(ts);
  if (['1m','5m','15m'].includes(tf))
    return dt.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  return dt.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'}) + ' ' +
         dt.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
}

Chart.defaults.color = '#555570';
Chart.defaults.borderColor = '#1e1e2e';

// ── BTC Chart ─────────────────────────────────────────────────────────────────
let btcChart = null, btcTF = '1m', btcWs = null;

function setTF(tf) {
  btcTF = tf;
  document.querySelectorAll('.tf-btns .tf-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === {
      '1m':'1м','5m':'5м','15m':'15м','1h':'1ч','4h':'4ч'
    }[tf]);
  });
  loadBtcChart();
}

async function loadBtcChart() {
  try {
    const r = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=BTCUSDT&interval=${btcTF}&limit=80`);
    const data = await r.json();
    const labels = data.map(d => fmtTime(d[0], btcTF));
    const closes = data.map(d => parseFloat(d[4]));
    const opens  = data.map(d => parseFloat(d[1]));
    const last = closes[closes.length-1], first = closes[0];
    const pct  = ((last - first) / first * 100).toFixed(2);
    const up   = last >= first;
    const lc   = up ? '#00ff88' : '#ff3366';

    document.getElementById('btc-price').textContent =
      '$' + last.toLocaleString('ru-RU',{minimumFractionDigits:2});
    const ce = document.getElementById('btc-change');
    ce.textContent = (up?'+':'') + pct + '%';
    ce.className = 'btc-change ' + (up?'up':'down');

    const ctx = document.getElementById('btcChart').getContext('2d');
    const grad = ctx.createLinearGradient(0,0,0,200);
    grad.addColorStop(0, up ? 'rgba(0,255,136,0.15)' : 'rgba(255,51,102,0.15)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');

    const ds = {label:'BTC',data:closes,borderColor:lc,borderWidth:2,
      backgroundColor:grad,fill:true,tension:0.3,pointRadius:0,pointHoverRadius:4,
      pointHoverBackgroundColor:lc};

    if (btcChart) { btcChart.data.labels=labels; btcChart.data.datasets[0]=ds; btcChart.update('none'); }
    else btcChart = new Chart(ctx, {type:'line',data:{labels,datasets:[ds]},
      options:{responsive:true,maintainAspectRatio:false,
        interaction:{intersect:false,mode:'index'},
        plugins:{legend:{display:false},tooltip:{backgroundColor:'#111118',borderColor:'#1e1e2e',
          borderWidth:1,titleFont:{family:'Space Mono',size:10},bodyFont:{family:'Space Mono',size:11},
          callbacks:{label:c=>'$'+c.raw.toLocaleString('ru-RU',{minimumFractionDigits:2})}}},
        scales:{x:{grid:{color:'rgba(30,30,46,0.8)'},ticks:{font:{family:'Space Mono',size:9},maxTicksLimit:8,maxRotation:0}},
          y:{position:'right',grid:{color:'rgba(30,30,46,0.8)'},
            ticks:{font:{family:'Space Mono',size:9},callback:v=>'$'+v.toLocaleString('ru-RU')}}}}});
  } catch(e) { console.error('BTC chart:', e); }
}

function connectBtcWs() {
  if (btcWs) btcWs.close();
  btcWs = new WebSocket('wss://fstream.binance.com/ws/btcusdt@bookTicker');
  btcWs.onmessage = e => {
    const d = JSON.parse(e.data);
    const mid = (parseFloat(d.b)+parseFloat(d.a))/2;
    const el = document.getElementById('btc-price');
    if (el) el.textContent = '$'+mid.toLocaleString('ru-RU',{minimumFractionDigits:2});
  };
  btcWs.onclose = () => setTimeout(connectBtcWs, 3000);
}

// ── Modal — график монеты по клику ────────────────────────────────────────────
let modalChart = null, modalSymbol = null, modalTF = '15m';

async function openSignalChart(symbol, signal) {
  modalSymbol = symbol;
  document.getElementById('modal-title').textContent = symbol;
  document.getElementById('modal').classList.add('open');
  document.querySelectorAll('.modal-tf-btns .tf-btn').forEach(b =>
    b.classList.toggle('active', b.textContent.trim() === '15м'));
  modalTF = '15m';

  // Инфо о сигнале
  const isLong = signal.direction === 'LONG';
  document.getElementById('modal-info').innerHTML = `
    <div class="modal-info-item"><div class="modal-info-label">Вход</div><div class="modal-info-val">${fmt(signal.entry)}</div></div>
    <div class="modal-info-item"><div class="modal-info-label">TP1</div><div class="modal-info-val" style="color:var(--green)">${fmt(signal.tp1)}</div></div>
    <div class="modal-info-item"><div class="modal-info-label">TP2</div><div class="modal-info-val" style="color:var(--green)">${fmt(signal.tp2)}</div></div>
    <div class="modal-info-item"><div class="modal-info-label">SL</div><div class="modal-info-val" style="color:var(--red)">${fmt(signal.sl)}</div></div>
  `;

  await loadModalChart();
}

function setModalTF(tf) {
  modalTF = tf;
  const labels = {'5m':'5м','15m':'15м','1h':'1ч','4h':'4ч'};
  document.querySelectorAll('.modal-tf-btns .tf-btn').forEach(b =>
    b.classList.toggle('active', b.textContent.trim() === labels[tf]));
  loadModalChart();
}

async function loadModalChart() {
  if (!modalSymbol) return;
  try {
    const r = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${modalSymbol}&interval=${modalTF}&limit=80`);
    const data = await r.json();
    const labels = data.map(d => fmtTime(d[0], modalTF));
    const closes = data.map(d => parseFloat(d[4]));
    const last = closes[closes.length-1], first = closes[0];
    const up   = last >= first;
    const lc   = up ? '#00ff88' : '#ff3366';

    const ctx = document.getElementById('modalChart').getContext('2d');
    const grad = ctx.createLinearGradient(0,0,0,260);
    grad.addColorStop(0, up ? 'rgba(0,255,136,0.15)' : 'rgba(255,51,102,0.15)');
    grad.addColorStop(1,'rgba(0,0,0,0)');

    const ds = {label:modalSymbol,data:closes,borderColor:lc,borderWidth:2,
      backgroundColor:grad,fill:true,tension:0.3,pointRadius:0,pointHoverRadius:4};

    if (modalChart) { modalChart.data.labels=labels; modalChart.data.datasets[0]=ds; modalChart.update('none'); }
    else modalChart = new Chart(ctx,{type:'line',data:{labels,datasets:[ds]},
      options:{responsive:true,maintainAspectRatio:false,
        interaction:{intersect:false,mode:'index'},
        plugins:{legend:{display:false},tooltip:{backgroundColor:'#111118',borderColor:'#1e1e2e',
          borderWidth:1,callbacks:{label:c=>'$'+c.raw.toLocaleString('ru-RU',{minimumFractionDigits:4})}}},
        scales:{x:{grid:{color:'rgba(30,30,46,0.8)'},ticks:{font:{family:'Space Mono',size:9},maxTicksLimit:8,maxRotation:0}},
          y:{position:'right',grid:{color:'rgba(30,30,46,0.8)'},
            ticks:{font:{family:'Space Mono',size:9},callback:v=>'$'+parseFloat(v).toFixed(4)}}}}});
  } catch(e) { console.error('Modal chart:', e); }
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal') || e.target.classList.contains('modal-close')) {
    document.getElementById('modal').classList.remove('open');
    if (modalChart) { modalChart.destroy(); modalChart = null; }
    modalSymbol = null;
  }
}

// ── Fear & Greed ──────────────────────────────────────────────────────────────
function renderFG(fg) {
  if (!fg) return;
  const v = fg.value;
  document.getElementById('fg-emoji').textContent  = fg.emoji || '😐';
  document.getElementById('fg-value').textContent  = v;
  document.getElementById('fg-label').textContent  = fg.label;
  const fill = document.getElementById('fg-fill');
  const color = v <= 24 ? '#ff3366' : v <= 49 ? '#ff8c00' : v <= 74 ? '#ffd700' : '#00ff88';
  fill.style.width     = v + '%';
  fill.style.background = color;
  document.getElementById('fg-value').style.color = color;
}

// ── Сигналы ───────────────────────────────────────────────────────────────────
let _signals = [];

function renderSignals(signals) {
  _signals = signals;
  const el = document.getElementById('signals-container');
  if (!signals.length) {
    el.innerHTML = '<div class="empty">🔍 Нет активных сигналов<br>Бот сканирует рынок...</div>';
    return;
  }
  el.innerHTML = signals.map((s,i) => {
    const lg   = s.direction === 'LONG';
    const tags = (s.reasons||[]).slice(0,4).map(r=>`<span class="reason-tag">${r}</span>`).join('');
    return `
    <div class="signal-card ${lg?'long':'short'}" onclick="openSignalChart('${s.symbol}',${JSON.stringify(s).replace(/'/g,"\\'")})">
      <div class="sig-header">
        <span class="sig-symbol">${s.symbol}</span>
        <span class="sig-dir ${lg?'long':'short'}">${s.direction} ${lg?'🚀':'📉'}</span>
      </div>
      <div class="sig-prices">
        <div class="price-item"><div class="price-label">Вход</div><div class="price-val">${fmt(s.entry)}</div></div>
        <div class="price-item"><div class="price-label">TP1</div><div class="price-val tp">${fmt(s.tp1)}</div></div>
        <div class="price-item"><div class="price-label">TP2</div><div class="price-val tp">${fmt(s.tp2)}</div></div>
        <div class="price-item"><div class="price-label">SL</div><div class="price-val sl">${fmt(s.sl)}</div></div>
      </div>
      <div class="strength-bar"><div class="strength-fill" style="width:${s.strength}%;background:${sc(s.strength)}"></div></div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:7px;font-family:'Space Mono',monospace">
        Сила: <span style="color:${sc(s.strength)};font-weight:700">${s.strength}%</span>
      </div>
      <div class="sig-reasons">${tags}</div>
      ${s.news?`<div style="font-size:10px;color:var(--muted);margin-top:8px;font-family:'Space Mono',monospace">📰 ${s.news.slice(0,80)}</div>`:''}
      <div class="sig-time">${ago(s.created_at)}</div>
      <div class="chart-hint">👆 Нажми для графика</div>
    </div>`;
  }).join('');
}

function renderHistory(h) {
  const tb = document.getElementById('history-body');
  if (!h.length) return;
  tb.innerHTML = h.map(r => {
    const lg = r.direction === 'LONG';
    const st = r.status.toUpperCase();
    const badge = (st==='TP1'||st==='TP2') ? `<span class="badge tp">${st} ✓</span>`
                : st==='SL' ? `<span class="badge sl">SL ✗</span>`
                : `<span class="badge exp">—</span>`;
    return `<tr>
      <td style="font-weight:700;cursor:pointer;color:var(--blue)" onclick="openSignalChart('${r.symbol}',${JSON.stringify(r)})">${r.symbol}</td>
      <td><span class="badge ${lg?'long':'short'}">${r.direction}</span></td>
      <td>${fmt(r.entry)}</td>
      <td style="color:var(--green)">${fmt(r.tp1)}</td>
      <td style="color:var(--red)">${fmt(r.sl)}</td>
      <td style="color:${sc(r.strength)}">${r.strength}%</td>
      <td>${badge}</td>
      <td style="color:var(--muted)">${ago(r.created_at)}</td>
    </tr>`;
  }).join('');
}

// ── data.json ─────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const r = await fetch('./data.json?t=' + Date.now());
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    const st = data.stats || {};
    document.getElementById('s-total').textContent   = st.total   ?? '—';
    document.getElementById('s-wins').textContent    = st.wins    ?? '—';
    document.getElementById('s-losses').textContent  = st.losses  ?? '—';
    document.getElementById('s-winrate').textContent = st.winrate != null ? st.winrate+'%' : '—';
    renderFG(data.fear_greed);
    renderSignals(data.signals || []);
    renderHistory(data.history || []);
    const d = new Date(data.updated_at);
    document.getElementById('last-update').innerHTML =
      `<span class="live-dot"></span>Обновлено: ${d.toLocaleTimeString('ru-RU')}`;
  } catch(e) {
    document.getElementById('last-update').innerHTML = `<span style="color:var(--red)">⚠ Нет данных от бота</span>`;
  }
}

// ── Старт ─────────────────────────────────────────────────────────────────────
loadBtcChart();
connectBtcWs();
loadData();
setInterval(loadBtcChart, 30000);
setInterval(loadData,     30000);
</script>
